body:
  text: 唐創業起居注卷下唐溫大雅撰起攝政至即真日凡一百八十三日義寧元年冬十一月甲子少帝以帝為丞相進封唐王位在王公上以武德殿為丞相府改教稱令萬機百度禮樂征伐兵馬糧仗庶績羣官並責成於相府惟郊祀天地四時禘祫奏聞帝固辭不拜公卿將佐等請曰公負孺子當朝豈得辭乎攝政公不入相王室何依臨茲大節義無小讓帝嘆曰王家失鹿遂使狐同老狼乃奉詔受册乙丑榆林靈武五原平源安定諸郡並舉城降並遣使詣義軍請命於是遣書發使慰喻巴蜀丙寅置丞相府長史已下屬官還以大將軍府僚裴寂等依次為之己卯以隴西公為唐王世子改封燉煌公為秦國公四郎元吉為齊國公仍改太原留守為鎮北府總統山東諸郡十二月隴西金城郡奴賊薛舉等破賊率唐弼于扶風自稱天子初弼遣使詣帝歸欵投狀扶風郡而為薛舉所圍帝遣援兵往扶風未至弼黨在郡城外為舉所圖弼遂被郡守竇璡所殺俄而璡及河池郡守蕭瑀相繼歸京師於是拜璡為戶部尚書上柱國封燕國公瑀拜禮部尚書封宋公是月也屈突通自潼關都尉府欲奔東都關上劉文靜等諸軍追而獲焉送之相府帝見通捨而禮之謂曰公以清貞奉上臣道不虧孤所翹心惟恨得卿之晚通拜欵劉文靜等仍定𢎞農郡及佐諸縣義寧二年春正月蜀漢及氐羌所在諸郡雄豪并守長等奉帝書感恱競遣子弟獻欵絡繹而至所司報答日有百餘梁益之間宴如也承詔封丞相長史裴寂為魏國公司馬劉文靜為魯國公趙興公神通為鄭國公永安公孝基為蜀國公自餘將佐殷開山劉𢎞基已下並以次封開國郡公縣公焉其日令曰李密趦趄鞏洛自許當塗王城如燬憂心孔棘東都危逼有若倒懸西人之子理本奔命其左右大都督府所統諸軍並冝誡嚴以時式遏有征無戰是為義師招諭不從勿難還也初年孟月春作方興不奪農時宜知其速於是以丗子為左元帥秦王為右元帥左右二府諸軍十餘萬衆引于滻水之北仍以尚書蕭瑀為相府司馬劉文靜為左元帥府長史尚書竇璡為掾殷開山為右元帥府長史司馬又拜屈突通為上柱國封蔣國公檢校行軍左右虞候事軍士以下僚佐等皆選知名者為之帝親詣軍勞而誓遣之二月涿郡太守羅藝與漁陽上谷北平栁城等郡諸官民遣使送欵先是平原賊竇建德聚衆數萬人充斥河右渤海髙陽等郡大將軍府使人張道源所定趙郡襄國武安清河等郡至是並陷于賊道源亦隨而沒焉建德遂僣稱王自號夏國又南陽朱祭衆有所望並好食人自稱可達汗莫知可達汗之名有何義理酷害異常又有賊蕭銑起兵於江陵于是以華陽公鄭元璹為太常卿封沛國公遣將兵出商山上洛道定南陽以東諸郡並遣使人左領軍大都督府司兵馬元規慰撫安陸及荆襄間三月左右二元帥軍招諭東都城門不啓李密又不敢西冦時逼農月遂奉令旋師冝陽新安二郡而還留行軍總管史萬寶盛彥師鎮宜陽吕紹宗任懷鎮新安少帝以帝功德日懋天厯有歸欲行禪讓之禮乃進帝為相國加九錫賜殊物加殊禮焉册曰於戲維爾假黃鉞使持莭大都督內外諸軍事録尚書大丞相新除相國總百揆唐王夫乾道貞觀四象所以運行坤德含𢎞萬有馮其載育是以天地交泰資始由乎聖人隂陽順成總已歸其元輔故能陶甄品物代彼天工息四海之羣飛回三靈之掩耀百揆時序五典克從雖伊尹格于皇天周公光于四表方斯蔑如也今將受王典册其敬聽朕命上天不造降禍于我國家髙祖棄盛業而升龍太上釋寶圖以委御王室如燬喪亂𢎞多數屬道消時鍾代季郊廟絶主有若綴旒則我祖宗之業已墜于地矣王應休眀之運從兆人之欲奉七璽於代邸飛六轡於周京此乃綱我絶維有大造於皇家者也曩者塞表省方羣胡反噬矢流君側圍甚平城淪陷指期阽危莫恤王釋位同謀總伐千里晨炊蓐食倍道兼行丐奴逺迹乘輿反正此則王之功也厯山飛稱兵燕趙妄假名號河朔響應山西屯結王首啓戎行大殱醜類此又王之功也夷狄貪婪屬犯關塞驅迫良善殺略吏人王鞠旅理兵卷甲長駕追奔逐北掃地無遺此又王之功也王威徒黨潛謀逆亂外交邉裔內騁姦回實繁有徒傾覆宗社王收戮凶渠罪人斯得此又王之功也四郊多壘三輔倒懸黃巾示宫闕之名赤眉為園陵之禍凶荒仍嵗荆棘旅庭王投袂義舉星言電邁取霍邑如摧枯舉秦關如反掌克清河渭志存匡復此又王之功也北荒獯鬻事藉羇縻比者中原多故龍堆道絶王式遏有方欵關請吏更敦鄰睦復我舊藩此又王之功也汾晉地險逋逃攸聚山藏川量負罪稽誅類馬騰之乞活同嚴尤之盡赦王懷柔伏叛杖信示威交臂屈膝申其向化此又王之功也河潼轉漕密邇關畿京坻委積由來尚矣羣凶據竊一鼓而崩此又王之功也京師危迫姦臣放命異一相之居內同四凶之扇禍王大誓師旅興言感慨蕩清上國拯厥贅旒暴市焚尸並梟元惡此又王之功也上天貽愛莫甚乎人爰祚聖哲弼豫沖幼官守司存社稷有奉濟方割于下墊爍圎光於上參此又王之功也唐弼凶豎草竊岐陽吞噬舊邦侵逼都鄙王制以䘖策觀其携二親離衆叛我盡收之此又王之功也華陽黑水控接岷嶓山川阻深盡為逋藪義風所靡化行江漢此又王之功也薛舉崇姦同惡相濟僣擬輿服滔天泯夏西土遊魂秦山肆毒赫斯授律咸俘醜類岐隴齊築京觀汧渭為之不流此又王之功也三蜀奧區一都之會夷民紛雜蠻陬荒梗王發一介之使降咫尺之書而靈關洞開劍閣無隘此又王之功也𢎞農甸服襟帶河陕鞠為寇場連城阻亂長策逺振不征而服此又王之功也王有濟天下之勳重之以眀德爰初發迹肇自鴻階峻極比于嵩華清瀾運于溟渤體兹將聖道被如仁在物不失其宜含靈咸安其所春生夏長信及四時地平天成義兼得一總萬機之務因百姓之心保乂我皇家𢎞濟乎多難者也是以濟濟多士庶政緝熙穆穆四時要荒式序激清風以厲俗暢和氣以調時神功侔於造化積德髙於垂象朕又聞之先王之宰物也尊賢尚德茂賞疇庸五侯専征九命作伯周襄光錫桓文是膺大啓南陽以表東海况乃道冠伊稷功髙晉鄭酬勳蔑爾朕甚懼焉今晉授相國以河內汲郡清河武安魏郡信都髙陽平原趙郡襄國通前三十郡增封唐國錫茲黑土苴以白茅爰定爾邦用建冢社昔周邵分陕咸為保傅毛畢諸侯入作卿士內外之任禮實攸宜今授相國印綬唐王璽紱茅土金獸符第一至第五竹使符第一至第十相國禮絶羣后任總所司朝班彛數宜以事革其以相國總百揆去録尚書之號上所假黃鉞內外都督丞相印綬又加王九錫其敬聽後命以王繩紀禮度哀矜折獄罔不用情無或遷志是用錫王大輅戎輅各一元牡二駟以王分地敦本人天是賴疏爵務農所寶惟榖是用錫王衮冕之服赤舄副焉以王風雅所被獯戎咸格隂陽順理遐邇宅心是用錫王軒懸之樂六佾之舞以王翼宣皇道義聲遐暢三才所運四海攸歸是用錫王朱戶以居以王登賢命秩裒德升朝思帝所難能官流詠是用錫王納陛以登以王正色持衡鎔範御下式遏姦宄蕩清華夏是用錫王武賁之士三百人以王威同夏日志厲秋霜刑厝有期寬而不漏是用錫王鈇鉞各一彤弓一彤矢百旅弓十旅矢千以王霜露履踐禋祀恭嚴天地幽通孝思至感是用錫王秬鬯一逌圭瓉副焉唐國冝置丞相己下一遵舊式往欽哉祗奉大禮用膺多福以光我髙祖之休命可不慎歟侍中陳叔達之詞也帝私謂元從府僚曰少帝今時可謂吾家所立本為社稷上報髙祖冀終隋氏不失人臣豈期孺子尚幼未復眀辟僥幸之徒諷其假孤名器安有至尊羽儀天子之禮假諸臣下何以為國孤總朝政此事不得不知政由己出還自錫進貪天之功以為己力孤不欺人敢欺天也羣僚等固請曰蕭何為相國魯公用王禮前賢不讓請以為不疑帝曰兩賢遇周漢之初興有大勳于二代孤屬亂離之季世值隋運之將盡昏眀時異授受事殊擬於其倫實多慙德然諸公欲孤行魏晉之故事為豹變之鴻漸聊為吾子揚榷而陳之曹馬之興不以義舉英雄鼎峙角逐爭衡無君之人欲速大位逼脅孤寡假詔自媒因九錫而論功矜百辟於殊禮示難進於謙退思厭塞於羣情故路人咸見其心有識呼為狐媚斯皆兆庶不推謳歌不屬者也宋齊蕞爾處於江湖地當漢之一郡自稱尊號可知必以魏晉為模楷習虞夏而禪讓功微五伯禮盛二王於是阿諛希旨之儔申敦勸于抗矯飾非輕薄之子騁讓辭而偉畢未聞桀紂之胤禪於殷周之初從此而言斷可知矣何輕易天命以自厚誣孤每觀前史見斯事迹未嘗不撫掌而笑嗤彼羣迷眀賢所棄見賢思齊勿循前弊時有啓帝者以為即真之漸舊事因循相承作故帝曰孤聞升天無階於何為漸必如來旨事轉成疑至若河濱側陋泗上亭長令其位次受終未易享國所問功德何如誰云位之大小以孤堪守關中能負孺子見推相國作鎮假王漢有前蹤不能違衆欲以曹操司馬炎為例九錫殊物賜加非宜不願擬議亦恥老瞞同傳公卿聞帝此旨寤而厚顔詣府陳謝帝又謂之曰魏氏以來革命不少鴻儒碩學世有名臣佐命興皇皆行禪代不量功業之本惟存揖讓之容上下相蒙遂為故實寧有湯武接于夏殷不憲章於堯舜晉魏隔於周漢翻祖述於勛華且堯之禪舜二聖繼踵舜因讓禹以眀堯哲示天下為至公不私己於尊位故賔虞以後若脫屣焉是知非堯不能讓舜非舜不能命禹商周德所不逮有撥亂反正之功順天行誅逆取順守咸以至誠兼濟無隱神祗三五帝王稱茲四聖英聲茂實飛騰萬古堯舜不及于子讓德而稱帝湯武不私于後胤力取而為王故道有降差名有優劣然立功立德亦各一時末葉後來功德無紀時逄屯否擁兵竊命託云輔政擇立餘孽頑嚚支庶先被推崇睿哲英宗密加夷戮専權任己逼令讓位雖欲己同於舜不覺禪者非堯貶德於唐虞見過于湯武豈不悖哉魏晉宋齊為惑已甚託言之士須知得失羣公退而恱服私相謂曰相王格論絶後光前彂眀典謨申理誓誥可謂君子一言定八代之榮辱矣帝又謂所親曰諸人雖復見吾言論仍自不知至理吾今匡天下三分有二入關形勢頗似漢髙且起軍甲子旗幟已革如何更於少帝之處却受九錫而求殊禮孺子有知不容肯行此事既成無識此乃吾自為之立身以來不欺暗室如何今日誣罔天聽所區别帝王激揚名理以懲是古非今之輩謬相勸逼于是惟改丞相府為相國府而九錫殊禮並屬諸有司是月也宇文化及兼弟智及等并驍果武賁司馬龕監門郎將裴乾通等謀同逆因驍果等欲還精鋭遂夜率之而圍江都宫殺後主於彭城閣初驍果兵等苦于久在江都咸思歸叛至是煬帝知唐據有西京過江計定仍先分驍果往守會稽誑之云往東吳催米故化及等因之而作難於是隋主崩問至帝乃率文武羣賢僚佐從少帝舉哀於大興後殿帝哭哀甚有諌止帝者帝曰吾為人下喪居何可不哀然亦恨後主不亡於開皇之末以延鼎祚耳化及等本自因思歸之衆而行殺逆及以許公之子為衆所推至是遂僣稱尊號率其同惡欲入關以李密斷成臯據洛口乃圖北取黎陽倉從白馬津而渡帝乃遣統軍張倫將蒲津以東從兵往魏郡道招慰化及等繼遣淮安王神通往定山東諸郡又募犯罪者數千人聽效力贖罪并張倫等並是淮安王節度焉李密聞化及之趣河北乃分兵遣别將徐世績等屯黎陽拒守化及從宛道渡河絶糧遂頓於聊城縣淮安王等率衆圖城部分失機行兵不利退保魏郡化及衆聚聊城糧無所出竇建德知其窮蹙遂攻破之獲化及兼弟智及責以弒逆並斬之而徇衆煬帝蕭皇后亦沒于賊庭于是江都宫人美女珍寶金帛及乎玉璽並建德有之不逞之徒因説建德送蕭皇后及宫人等多賫金帛重賂突厥市馬而求援少帝年未勝衣不經師傅長於婦人之手時事茫然既知煬帝不存惟求潛遜夏四月詔曰天禍隋國大行太上皇遇盜江都酷甚望夷釁深驪北憫豫小子奄紹丕愆哀號永感五情糜潰仰惟荼毒仇復靡申形影相吊罔知啓處相國唐王膺期命丗扶危拯溺自北徂南東征西伐總九合于一匡決百勝于千里糾率夷夏大庇氓黎保乂朕躬繄王是賴德侔造化功格蒼旻兆庶歸心歷數斯在屈為人臣載違天命昔在虞夏揖讓相推茍非重華誰堪命禹當今九服崩離三靈改卜大運去矣請避賢路兆謀布德顧己莫能私僮命駕須歸藩國豫本代王及豫而代天之所廢豈其如是庶憑稽古之聖以誅四凶幸值惟新之恩預充三恪雪恥怨於皇祖守禋祀為孝孫朝聞夕殞及泉無恨今遵故事遜於舊邸庶官羣后改事唐朝宜依前典趣上尊號若釋重負感泰兼懷假手真人俾除醜逆濟濟多士眀知朕意仍敕有司凡是表奏皆不得以聞章表不通理難再請欲召公卿議之漸以啓諭於是文武將佐裴寂等二千人不謀同辭並不肯奏詔乃相率上疏勸進曰臣聞天下至公非一姓之獨有聖人達節與萬物而推移故五運遞興百王更王春蘭秋菊無絶終古玉疏石記筆舌紛綸垂統有光煥乎寶籙伏惟陛下資靈種德稟慶至真固縱惟神生知乃聖量包乎宇宙智周乎品物羣生塗炭躋之仁夀逄百六之厄創業雲雷追三五之蹤財成天地仲夏之半龍躍晉陽孟冬伊始鳳翔灞上鴻志蝟毛之反者霧委來庭觸柱拔山之大盜風馳獻欵三晉子弟共獯獫而陪麾咸秦豪傑連巴蜀而響應英聲西被懋德東漸南諧交趾北變幽都躬未戎衣手不提劍機務成於雄斷人傑得於才子威加四海功出一門計及萬安戰窮百勝小往大來算無遺䇿時未期月業倍前王今古代興膺斯撥亂若茲之舉如茲之速載籍以來未之前聞也臣等誠歡誠喜頓首頓首死罪竊以陛下承家開國積德纍功世濟擬于髙陽纘緒盛於周武載誕燭神光之異儀形表玉勝之竒白雀呈祥丹書授歷名合天淵姓符桃李君堯之國靡不則天星紀云周奉時圖始甲子之旦不俟而脫起兵西北勢合乘乾我來自東位當出震至八井深水之圖讖堂堂李樹之鐃歌固以備在人謡無德而稱者也且夫體非常之道立非常之功實非常之人有非常之事不時正位人神佇式天命不常惟德是與遷虞事夏抑有前規臣等敢録舊典奉上尊號當今萬機曠主九有困窮伏願降鑒回慮憂世外已上順天心祗膺允執俯從人願屈就樂推變黎庶于時雍配上帝于宗祀勿以王者兼濟之功而為匹夫獨美之操昔之堯佐咸大天工績尤著者胤饗稷卨播榖之都餘慶商周臯陶好生洽人今興陛下盛德有後其若是乎四相三王齊名踵武千年得一相繼風聲符命所鍾有自來矣願納縉紳慺慺之情允副億兆顒顒之望率土更生含靈幸甚臣等誠惶誠恐昧死以聞頓首頓首死罪死罪所司以表意奏聞帝退所奏表謂奏者曰吾固知如是拒而不答裴寂等進見曰昔桀紂雖復不賢亦各有子未聞湯武臣輔之龜鏡已見茲無所疑也先人有言曰功蓋天下者不賞陛下欲讓至尊而為臣下恐隋朝不然此事且臣等唐之將佐茅土大位受之唐國陛下不為唐帝臣等應須去官伏碩深思容臣等有地帝笑曰裴公何相逼之深當為審思亦未之許裴寂等又依光武長安同舍人強華奉赤伏符故事乃奏神人太原慧化尼蜀郡衛元嵩等歌謡詩讖慧化尼歌詞曰東海十八子八井喚三軍手持雙白雀頭上戴紫雲又曰丁丑語甲子深藏入堂裏何意坐堂裏中央有天子又曰西北天火照龍山昭童子赤光連北斗童子木上懸白幡胡兵紛紛滿前後拍手唱堂堂驅羊向南走又曰胡兵未濟漢不整治中都護有八井又曰興伍伍仁義行武得九九得聲名童子木底百丈水東家井裡五色星我語不可信問取衛先生蜀郡衛元嵩周天和五年閏十月作詩戌亥君臣亂子丑破城隍寅卯如欲定龍蛇伏四方十八成男子洪水主刀傍市朝義歸政人寧俱不荒人言有恆性也復道非常為君好思量何闕禹湯桃源花闕李樹起堂堂只看寅卯嵗深水沒黃楊未萌之前謡讖遍於天下今覩其事人人皆知之陛下雖不以介懷天下信為靈效特此欲作常闕以免須上為七廟下安萬民既膺符命不得拘文牽旨違天不祥裴寂等言之甚切帝曰所以逡巡至於再三者非徒推讓亦恐羣公面諛退為口實然漢髙云諸侯王推髙于寡人以為皇帝位甚便宜于天下之民則可矣孤亦何能有異之哉於是寂等再拜舞蹈稱萬嵗而出遂與國子博士丁孝烏等數百人具禮儀擇良日以武德元年嵗在戊寅五月甲子皇帝即位於太極前殿設壇于長安城南柴燎告天册文曰皇帝臣某敢用元牡昭告于皇天后帝生人以來樹之司牧眷命所屬謂之大寶歷數不在罔一作時或偷安故舜禹至公揖讓而興虞夏湯武兼濟干弋而有啇周事乃殊途功成一致後之創業咸取則焉某承家慶丗祿降祉曰祖曰考纍功載德賜履參墟建侯唐舊地居戚里門號公宫不緒建基足為榮矣但有隋屬厭大業爽德飢饉師旅民胥怨咨謫見咎徵昭於皇鑒備聞卑聽所不忍言某守晉陽馳心魏闕授手濡足拯溺救焚大舉義兵式寧區宇懲邊荒之辮髮輯兆庶之離心誓以捐軀救茲生命指除喪亂期之乂安有功繼世無希九五惟身及子竭誠盡力率先鋒鏑誓以無二再蒙𢎞誘克濟艱難電掃風驅廓清大邑傳檄而定峨嵋拱手而平關隴西戎即敘東夷底定非啓非贊孰能茲速尊立丗嫡翼奉宗隋戮力輔政無虧臣莭值鼎祚云革天祿將移謳歌獄訟聿來唐邸人神符瑞輻湊微躬逺近宅心華夷請命少帝知神器有適大運去之遜位而禪若隋之初讓德不嗣羣情逼請六宗闕祀七政未齊罪有所歸恐當天譴請因吉日克舉前典設壇肆類祗謁上帝惠茲下人翼子謀孫罔敢愆德則小則大無或有違對越鴻休伏深慙懼謹遣太尉公裴寂等用薦告之禮瑞册蒼璧秬鬯清酌薌合薌萁眀粢嘉蔬禋祀于皇皇后帝眀靈降享闕備羽儀法物臨軒大赦天下改義寧二年為武德元年闕踐祚有司以子卯不樂請擇他日帝曰嵗在戊寅闕始此為難得至今遇之烏可失之且殷周二代闕所之以為大吉同域之誡又甲于五行為木木加於子闕良日雖欲勿用其能捨諸故自起軍逮乎入相登極咸用甲子焉唐創業起居注卷下
