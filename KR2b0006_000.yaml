body:
  text: 唐創業起居注編年類提要臣等謹案唐創業起居注三卷唐溫大雅撰大雅字彥寵并州祁人官禮部尚書封黎國公事蹟具新舊唐書本傳其書唐宋志作三卷通考作五卷今此本三卷與唐宋志合史稱髙祖兵興引大雅為記室參軍主文檄則此書記三百五十七日之事所得於見聞者當獨為真確今與髙祖本紀參較若劉仁恭為突厥所敗煬帝驛繫髙祖此書稱髙祖謂秦王曰今遭羑里之厄爾昆季須㑹盟津之師是興師由髙祖而本紀則謂舉事由秦王又此書載隋少帝以夏四月詔曰今遵故事遜於舊邸而本紀則繫之五月戊午凡此之類皆疑此書為得其實未可與尋常稗史一槩而論也乾隆四十二年五月恭校上總纂官臣紀昀臣陸錫熊臣孫士毅總校官臣陸費墀
  hash: sha256:b85ef014bc1b05948c3763f2d6cd1a20de6738c2c29c9f34fe7a87bf1d9b0df6
