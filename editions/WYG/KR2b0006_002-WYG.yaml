body:
  text: 唐創業起居注卷中唐温大雅撰起自太原至京城凡一百二十六日秋七月壬子以四郎元吉為太原郡守留守晉陽宫文武後事並委焉義師欲西入闗移營於武徳南癸丑将引帝立軍門仗白旗而大號誓衆文曰夫天地定位否泰迭其盛衰日月著眀虧昃貶其貞滿惟神莫測尚乃盈虚矧兹王道能無悔恡克先帝世炎漢商周撥亂乘乾多歴年所厥嗣墜緒時屬艱危則其股肱宰衡藩屏親戚戮力同奨推心翼戴顛或可扶糺合而奔官守惡不可救廢放而安宗社伊霍桓文並其人也率爾踵武代有其事布在方䇿可得而言日者蒼精云謝炎運将唘上天眷命屬乎隋室於是我髙祖文皇帝以后父之尊周親入相豹變陕左龍飛漢東誅尉逈扵韓魏則神鉦遏響剿王謙於巴蜀則靈山斯鏤四罪咸服九有樂推經綸帷幄之間揖讓巖廊之内造我區夏不更朞月舜禹以来受終未有如斯之易者以故臨朝恭已庶績爲心親覽萬㡬平章百姓兢兢慎于馭朽翼翼懼於烹鮮齊六合爲一家等黔黎于赤子有陳不率殄虐政於江湖獯醜相屠降封虜于沙漠其吊民也如彼其和戎也若兹􅄆馬牛於山林鑄劍㦸為農器求瘼恤隠訟息刑清輕徭薄賦家給人足倉庫流衍於里閭職貢委輸于帑蔵豈獨水衡貫朽常平粟紅而已哉加以愛民治國節用而敦本深根固蒂因河而踐華肆覲朝宗止于京邑元覽縱觀弗踰岐下遐邇叶和内外禔福愷澤洋溢休祥紹至一世之氓咸頼仁夀二紀之治可謂隆平揚搉往初歴選前辟詩書所羙莫之能尚然聖人千慮失於知子以正萬國輕易元良􅆸守器之長立不才之庶兆亂之萌於是乎在異哉今上之行己也獨智自賢安忍忌刻拓狂悖為混沌茍鴆毒為恣雎飾非好佞拒諌信讒敵怨誠良仇讐骨肉巡幸無度窮兵極武喜怒不恒親離衆叛御河導洛肆舳艫而達江馳道縁邊徑長城而傍海離宫别舘之所在車轍馬跡之所向咸塹山而陻谷畢結瑤而搆瓊遼水屢征殱丁壮扵億兆伊谷轉輸斃老幼扵百萬禽荒罄於飛走蠶食窮於水陸征稅盡於重歛民力殫於勞止十分天下九為盜賊荆棘旅于闕廷犲狼充於道路帶牛佩犢輟耕者連孤竹而㓂潢池鋤耰棘矜大呼者聚萑蒲而起芒澤青羌白狄剽夷道而闕黄巾赤眉屠閭左而竊號曝骸如莽僵尸若麻敵國滿畫鷁之舟胡越繞和鸞之轂四海波振而氷泮五嶽塵飛而土崩踞積薪以待然鉗衆口而寄坐明眀皇祖貽厥無人赫赫宗隋滅爲亡國某以庸虚謬䝉嘉恵承七葉之餘慶資五世之克昌遂得地臣戚里家稱公室典驍衛之禁兵守封唐之大宇義無坐觀綴旒之絶不舉勤王之師茍利社稷専之可也廢昏立眀敢遵故實今便興甲晉陽奉尊代邸掃定咸雒集寜㝢縣放後主于江都復先帝之鴻績固配天于圜寝存司牧於蒼生豈謂一朝言及於此事不獲已追増感欷凡厥士民義旅豪傑敏究時難曉達權謀家怨國恥雪乎今日從我同盟無為貳志有渝此盟神其殛之仍命以此􅊎辭檄喻所在郡縣并命檄書勿得因循妄論軍勢帝性簡質大度豁如前代自矜逺嫌之事皆以恕實行之不爲欺紿自然反經合義妙盡機權類皆如此其義士等各以名到先後為次第汎加宣恵綏徳二尉官帝謂行之等曰吾未特為此官示宣行恵知綏撫以徳使逺者知有征無戰見我心焉是夕次於清源牧馬置營皆據髙險老弱樵採丁壮休息虞候覘守之地飛鳥不通勿論人也帝乃將世子及敦煌公等率家僮十數廵行營幕次比器仗精粗坐卧飲食糧禀升斗馬驢饑飽逮乎僕𨽻皆親閱之如有不周即令從人借助亦不責所屬典司顧謂二児曰天下神器聖人大寶非符命所屬大功濟世不可妄居所以納揆試艱虞登帝位櫛風沭雨夏㑹諸侯自時厥後膺圖甚衆啓基創業未有無功而得帝王者也吾生自公宫長于貴戚牧州典郡少年所為晏樂從容懽娛事極饑寒賤役見而未經險阻艱難聞而不冒在茲行也並欲備嘗如弗躬親恐違天㫖爾等從吾勿欲懈怠今欲不言而治故無所尤庶愚者恱我寛容智者慙而改過世子及敦煌公請曰經綸機務一日萬端取决英謩四方輻湊麾下驅馳兒等承之自餘常事請付司存巨細以聞恐疲神思又慮将佐等不被委任頗以自疑帝曰是何言與是何言與華夷不附爵賞不行吾之責也摧鋒蹈刅斬将搴旗爾之務也深溝髙壘談笑從容将吏之逸也吾憂責爾急於務逸樂推下功名與之賢自當内省不賢吾無所愧然晉陽從我可謂同心之人俱非致命之士漢初有蕭曺而無爾軰今我有爾軰而無蕭曺天道平分乃復如是行矣自愛吾知爾懐自是以後記室奉命宣㫖稱教部伍間事給付一物軍書羽檄賞罸科條接撫初附慰恱逺近帝或口陳事緒手疏意謂發言折中下筆當理非奉進㫖所司莫能裁答義旗之下毎日千有餘人請賞論勲告寃申屈附文希㫖百計千端来衆如雲觀者如堵帝處斷若流甞無疑滯人人得所咸盡懽心皆嘆神眀謂為天下主也壬寅遣通議大夫張綸等率師經略稽胡離石龍泉文成等諸郡丙辰至于西河引見民庶等禮敬耆老哀撫煢獨賑貸窮困擢任賢能平章獄訟日昃而罷罔有所遺顧謂左右曰向之五條惟皇要道聰眀文思以之建極孤所以自强不息為義兵之先聲也仍自注授老人七十已上通議朝請朝􅄆三大夫等官教曰乞言将智事屬髙年耄耋杖郷禮宜優異老人等年餘七十匍匐壘壁見我義旗懽踰擊壤筋力之禮知不可為肉帛之資慮其多闕式加榮秩以賙其養節級並如前授自外當土豪雋以資除授各有差官之大小並帝自手注量才叙効咸得厥宜口問功能筆不停輟所司唯給告身而已爾後遂為恒式帝特善書工而且疾真草不拘常體而草跡韶媚可愛嘗一日注授千許人官更案遇得好紙走筆若飛食頃而訖得官人等不敢取告符乞寶神筆之跡遂各分所授官名而去乙丑張綸等下離石郡其太守楊子崇為亂兵所害崇即後主從弟也頗有學識性理帝甚惜之崇性怯而無謨故及於難入自雀䑕谷次于靈石縣壬戌霖雨甚頓營於賈胡堡去霍邑五十餘里此縣西北抗汾水東拒霍太山守險之衝是為襟帶西京留守代王遣驍将獸牙郎将宋老生率精兵二萬拒守又遣左武候大将軍屈突通将遼東兵及驍果等數萬餘人據河東與老生相影響仍命臨汾以東諸郡所在軍民城守並隨便受老生屈突等徵發帝聞而笑曰億兆離心此何為也老生乳臭未知師老之謀屈突膽薄嘗無曲突之慮自防輕敵二子有之閫外相時俱非其事且屈突嘗破𤣥感時人謂其能兵老生數勝羣盜自許堪當勍敵無識之徒因相謟附謂其必能制我不遣援兵我若緩以持之彼必以吾為怯出其不意不過一兩月間並當擒之吾無憂也于時秋霖未止道路泥深帝乃命府佐沈叔安崔善為等間遣羸兵往太原更運一月糧以待開霽甲子有白衣野老自云霍太山遣来詣帝請謁帝𢎞達至理不語神怪逮乎佛道亦以致疑未之深信門人不敢以聞此老乃伺帝行營路左拜見帝戲謂之曰神本不測卿何得見卿非神類豈共神言野老對曰某事山祠山中聞語遣語大唐皇帝云若往霍邑冝東南傍山取路八月初雨止我當為帝破之可為吾立祠廣也帝試遣案行傍山向霍邑道路雖峻兵枉行而城中不見若取大路去縣十里城上人即遙見兵来帝曰行逢滯雨人多疲濕甲仗非精何可令人逺見且欲用權譎難為之朽山神示吾此路可謂指蹤雨霽有徴吾從神也然此神不欺趙襄子亦應無負於孤顧左右笑以為樂丙寅突厥始畢使達官級失特勒等先報已遣兵馬上道計日當至帝曰地名賈胡知胡将至天其假吾此胡以成王業也己巳榮陽賊帥李宻遣使送欵致書請與帝合從帝大恱謂大郎二郎等曰桀賊南柔强胡北附所憂此軰今並歸心主上志在過江京都憂死不暇天下可𫝊檄而定何樂如之初李宻與楊𤣥感同逆感誅而宻亡命投東郡賊帥翟讓讓知宻是蒲山公之子頗讀漢書納而禮之推為謀主宻以百姓饑弊說来據洛口倉屯守武牢之險宻自復舊封為魏公號翟讓為司徒公讓所部兵並齊濟間漁獵之手善用長槍華騶龍廐細馬所向江都者多為讓所劫故其兵銳扵他賊加以宻是逃刑之人同守衝要隋主以李氏當王又有桃李之歌謂宻應扵符䜟故不敢西顧尤加憚之宻雖為讓所推恐其圖已恭儉自勵布衣蔬食所居之室積書而已子女珍玩一無所取賑貸貧乏敬禮賓客故河汴間絶糧之士多往依之宻又形儀𦕈小讓弗之忌遂謀殺讓而并其衆宻以煬帝不来翟讓已死坐對敖倉便有自矜之志作書與帝以天下爲己任屢有大言其書多不録大略云欲帝為盟津之㑹殪商辛於牧野執子嬰於咸陽其㫖以殺後主執代王為意帝覽書抵掌謂所親曰宻誇誕不達天命適所以為吾拒東都之兵守成臯之扼更覔韓彭莫如用宻宜卑辭推奨以驕其志使其不虞於我得入闗據蒲津而屯永豐阻崤函而臨伊洛東㸔羣賊鷸蚌之勢吾然後為秦人之漁父矣記室承㫖報密書曰頃者崐山火烈海水羣飛赤縣邱墟黔黎塗炭布衣戍卒耰鋤棘矜爭帝圖王狐鳴蠭起翼翼京洛强弩圍城膴膴周原僵屍滿路主上南廵泛膠舟而忘返匃奴北熾将被髪於伊川輦上無虞羣下結舌大盜移國莫之敢指忽焉至此自貽伊戚七百年之基窮於二世周齊以往書契以還邦國淪胥未有如斯之酷者也則我髙祖之業㡬墜於地吾雖庸劣幸承餘緒出為八使入典八屯位未為髙足成非賤素飡當世􅀈俛叨榮從容平勃之間誰云不可但顛而不扶通賢所責主憂臣辱無義徒然等袁公而流涕極賈生之慟哭所以仗旗投袂大㑹義兵綏撫河朔和親蕃塞共匡天下志在尊隋以弟見機而作一日千里雞鳴起舞豹變先鞭御宇當塗聿来中土兵臨郏鄏将觀周鼎營屯敖倉酷似漢王前遣簡書屈為唇齒今辱来㫖莫我肯顧天生蒸民必有司牧當今為牧非子而誰老夫年踰知命願不及此欣戴大弟攀鱗附翼惟冀早膺圖籙以寜兆庶宗盟之長屬籍見容復封于唐斯足榮矣殪商辛扵牧野所不忍言執子嬰扵咸陽非敢聞命汾晉左右尚須安輯盟津之㑹未暇卜期今日鑾輿南幸恐同永嘉之勢顧此中原鞠為茂草興言感歎實疚扵懐脫知動静遲數貽報未面虚襟用增勞軫名利之地鋒鏑縱横深慎埀堂勉茲鴻業宻得帝書甚恱示其部下曰唐公見推天下不足定也遂注意東都無心外略劉文静之使蕃也来遲而突厥兵馬未至時有流言者云突厥欲與武周南入乗虚掩襲太原帝集文武官人及大郎二郎等而謂之曰以天賛我而言應無此勢以人事見機而𤼵無有不為此行遣吾當突厥武周之地何有不来之理諸公意謂何議者以老生突厥相去不遥李宻譎誑奸謀難測突厥見利則行武周事胡者也太原一都之㑹義兵家屬在焉愚夫所慮伏聽教㫖帝顧謂大郎二郎等曰爾軰如何對曰武周位極而志滿突厥少信而貪利外雖相附内實相猜突厥必欲逺離太原寜肯近亡馬邑武周悉其此勢必未同謀又朝廷既聞唐國舉兵憂虞不暇京都留守特畏義旗所以驍将精兵鱗次在近今若却還諸軍不知其故更相恐動必有變生營之内外皆為勍敵於是突厥武周不謀同至老生屈突追奔競来進闕圖南退窮自北還無所入往無所之畏溺先沉近于斯矣且今来禾菽被野人馬無憂坐足有糧行即得衆李宻戀于倉米未遑逺畧老生輕躁破之不疑定業取威在茲一决諸人保家愛命所謂言之者也児等捐軀力戰可謂行之者也耕織自有其人請無他問雨罷進軍若不殺老生而取霍邑兒等敢以死謝帝喜曰爾謀得之吾其決矣三占從二何籍輿言懦夫之徒㡬敗乃公事耳丙子太原運糧人等至八月己夘霖止帝指霍太山而言曰此神之語信而有徵封内名山禮許諸侯有事乃命所部鄉人設祠致祭焉庚辰命諸軍曝行装整鎧仗辛巳且發引取傍山道而趍霍邑七十餘里初行霧甚俄而秋景澄眀帝謂大郎二郎曰今日之行在卿兩将景色如此天似為人唯恐老生怯而不戰閉門城守其若之何大郎二郎唘帝曰老生出自寒微勇而無智討捕小盜頗有聲名今来居此必當大䝉賞勞若不出戰死在不疑䡖騎挑之無憂不出如其固守便可誣其相引謬為誠節彼無識解不知逺大為其左右體悉凡庸羣小相猜自成疑阻無妨密相表奏不廢𫝊首京都小慧之人思此觧事以此量之来戰不惑帝曰老生不能逆戰賈胡吾知無能為也爾等籌之妙盡其實是日未時帝将麾下左右輕騎數百先到霍邑城東去五六里以待步兵至方欲下營且遣大郎二郎各将數十騎逼其城行視戰地帝分所将人為十數隊廵其城東南而向西南往往指麾似若安營而攻城者仍遣殷開山急追馬歩等後軍老生在城上遙見後軍欲來真謂逼其城置營乃從南門東門兩道引兵而出衆将三萬許人帝慮其背城不肯逺闘乃部勒所将騎兵馬左右軍大郎領左軍擬屯其東門二郎将右軍擬斷其南門之路仍命小縮偽若避之既而老生見帝兵却謂為畏己果引兵更前去城里餘而陣殷開山等所追歩兵前軍統到方陣以當老生中軍後軍相續而至未及戰帝命大郎二郎依前部分馳而向門義兵齊呼而前紅塵暗合皷未及動鋒刅已交響若山崩城樓皆振帝乃傳言已斬宋老生所部衆聞而大亂捨仗而走争奔所出之門門已大郎二郎先所屯守懸門不發老生取入不得城上人下䋲引之老生攀䋲欲上去地丈餘軍頭盧君諤所部人等跳躍及而斬之𫝊首詣帝於是兵隨所向奮擊禁不可止數里之間血流蔽地僵屍相枕日欲将落帝見戰士心銳仍命登城時無攻具肉薄而上自申至酉遂平霍邑帝視戰地愴然謂左右曰河東已来孤之所使百姓見義旗有誠節老生所逼至于塗炭亂兵之下善惡不分火燒崐山誰論玉石無妨死人之内大有赤心於我者也取来不得及此戰亡生未被知没有餘恨静而思之良深痛惜從今已去當以文徳来之不復用兵戈矣其破霍邑攻戰人等有勲者並依格賞受事不踰曰惟有徒𨽻一色勲司疑請教曰義兵取人山藏海納逮乎徒𨽻亦無棄者及著勲績所司致疑覽其所請可為太息豈有矢石之間不辨貴賤庸勲之次便有等差以此論功将何以勸黥而為王亦何妨也賞宜從重吾其與之諸部曲及徒𨽻征伐有功勲者並從本色勲授壬午帝引霍邑城内老生文武長㓜見而勞之曰老生之外孤無所咎縱卿不誠于孤亦當以赤心相仰乃節級授官與元從人齊等其丁壮勝兵者即遣從軍配左右領軍大都督還取其同色同黨自相綂䖏之不為疑異俘降之徒不勝喜躍欣若再生其有闗中人欲還者即授五品􅄆官放還内外咸恱咸思報効仍命葬宋老生以本官之禮自是以後未歸附者無問郷村堡塢賢愚貴賤咸遣書招慰之無有不至其来詣軍者帝並節級授朝􅄆大夫以上官至于逸民道士亦請効力教曰義旗撥亂庶品来蘇類聚羣分無思不至乃有出自青溪逺辭丹竈就人間而齊物從戎馬以同塵咸願解巾負茲覊鞢雖欲勿用重違其請逸民道士等誠有可嘉並依前授人或以授官太髙諌帝者帝曰不恡爵賞漢氏以興比屋可封唐之盛徳吾方稽古敢不遵行天下之利義無獨饗率土皆貴于我豈不益尊乎且皇隋敗壊各歸於此鴈門解圍之効東都援臺之勲在難即許授大夫免禍則惟加小尉所以士無鬪志将有墮心版蕩分崩至于今日覆車眀鑒誰敢効尤然亦使外寇覬覦之徒嘗授無過此也又加官慰撫何如用兵殺戮好生任賞吾覺其優當以不日而定天下非卿等小見所及丙戌入臨汾郡勞撫任用郡内官民一如霍邑庚寅宿于絳郡西北之皷山此山帝為討捕大使時舊停營所故逗而宿焉去絳十餘里絳城不下是日曉鼓山西北有大浮雲色或紫或赤似華盖樓闕之形須㬰有暴風吹来向營而臨帝所居帳上帝指絳城而謂傍侍曰風雲如此見從彼何不達之甚仍命厨人眀日下城而後進食辛夘帝觀兵于絳城将士等争欲先登因而縱上自夘及巳遂取之而食於正平縣令李安逺之宅通守陳叔達己下面縳請罪並捨而不問待之如初餘依臨汾郡部分癸巳至于龍門縣劉文静康鞘利等来自北蕃突厥五百人馬二千疋從鞘利等至帝喜其兵少而來遲藉之以闗隴謂劉文静曰吾已及河突厥始至馬多人少甚惬本懐先是帝使時于此縣界見河水清皇太子又于此界獲元狐扵往縣西南宴見鞘利并與縣内道俗等叙舊極懽丙申至汾隂遣書招馮翊賊帥孫華華所部强兵至餘數千積年刼掠非常富實濼水以北莫敢當之帝書到華喜而從命己亥進營停于壺口分遣諸軍問津水濱之人具舟争進日有數百仍署水軍焉辛丑太原獲青石龜形文有丹書四字曰李治萬世齊王遣使獻之翠石丹文天然映徹上方下銳宛若龜形神工器物見者咸驚竒異帝初弗之信也乃令水漬磨以騐之所司浸而經宿久磨其字愈更鮮眀於是内外畢賀帝曰上天眀命貺以萬吉恭承休祉須安萬方孤以寡徳寜堪預此既為人下不容以之頒告宜以少牢祀石龜而爵送龜人用彰休慶是日又有獲嘉禾而獻者教曰嘉禾為瑞聞諸往䇿逮乎唐氏世有兹祥放勛獲之於前叔虞得之于後孤今糺合復逢靈貺出自興平來因善樂休徴偉兆何其羙與顧循虚薄未堪當此呈形之䖏須表天休送嘉禾人興平孔善樂宜授朝􅄆大夫以旌嘉應壬寅孫華率其腹心輕騎數十至自郃陽華年餘弱冠言容質直帝見而輕之華毎殷勤誠欵請先立効帝乃厚加撫遇甚得其情謂華曰卿能渡河逺来相見吾當貴卿不減鄧仲華也關中卿軰不少名並劣卿卿今率先從我羣雄當相繼而至於是拜華左光祿大夫封武郷縣公加馮翊郡守從其来者仍委華以次授官頒賜各有差仍命華先濟為西道主人華大恱而去仍命左右統軍王長諧劉𢎞基并左領軍大都督府長史陳演夀等率師次華而渡據河西㟁以待大兵九月乙夘張綸自離石道下龍泉文城等郡獲文城太守莘公鄭元璹送焉帝見元璹釋而遣之初王長諧劉𢎞基陳演夀之濟河也帝誡之曰屈突通今在河東精兵不少相去五十餘里而不敢来足騐人情不為之用然通雖不武乆在戎行守法懼罪終無坐位不妨伺便時相邀襲宜為之備以折要衝通若不入闗河東自然歸我分兵向彼我即擊其河東通若全兵守城卿宜絶其橋道可謂前扼其喉後撫其背首尾相救非通所堪若不走之必成擒矣吾且按兵觀其進退至是通聞孫華導長諧等渡河果遣獸牙郎将桑顯和率驍果精騎數千人夜馳掩襲長諧等軍營諧及孫華等奉教備預故並覺之伺和赴營設伏分擊應時摧􅄆追奔至扵飲馬泉斬首獲生略以千計顯和走入河東城僅以身免仍撤斷蒲津橋帝聞而謂官屬曰屈突遣兵此行事不獲已今若進逼圍之必不敢出使劉𢎞基孫華等至闗門斷其行路然後吾於壺口朝服濟河利渉大川斯之謂矣戊午帝親率諸軍圍河東郡分遣大郎二郎長史裴寂勒兵各守一面帝登城東原上西望城内所為屈突果不敢出兵閉門自守城髙甚峻不易可攻帝觀義士等志試遣登之南面千餘人應時而上時值雨甚帝命旋師軍人既得上城遂不時速下帝曰屈突宿衛舊人解安陣隊野戰非其所長嬰城善爲捍禦我師常勝人必輕之驍鋭先登恐無還路今且示威而已未是攻城之時殺人得城如何可用乃還命諸将移營河渚文武将佐等已下定河北衆餘十數萬今欲入闗請兼置公府觀領太尉増選僚屬帝曰兵臨蒲坂諸君欲以舜職見推此意可知未煩如此必爲僚屬増府任從便宜加置於是復領太尉丙辰馮翊太守蕭造率官属舉郡歸義相繼有華隂縣令李孝常據永豐倉遣子弟妹夫竇軌等送欵仍便應接河西關上兵馬又京兆萬年醴泉䓁諸縣皆遣使至帝曰吾未濟者正須此耳今既事辦可以濟乎乃命所司以少牢祀河庚申率諸軍以次而渡甲子舍于朝邑長春宫三秦士庶衣冠子弟郡縣長吏豪族弟兄老㓜相携来者如市帝皆引見親勞問仍節級授官教曰義旗濟河闗中響應轅門輻凑赴者如歸五陵豪傑三輔冠盖公卿将相之緒餘侠少良家之子弟從吾投刺咸畏後時扼腕連鑣争求立效縻之好爵以永今朝扵是秦人大恱更相語曰真吾主也来何晚哉咸􅂅前駈以死自効丙寅遣世子隴西公将司馬劉文静統軍王長諧姜寶誼寶琮諸軍數萬人屯永豐倉守潼闗備他盜慰撫使人竇軌等受節度焉遣燉煌公率統軍劉𢎞基長孫順徳楊毛等諸軍數萬人往髙陵道定涇陽雲陽武功􅉦厔鄠諸縣等慰撫使人掾殷開山等受節度焉先是帝從弟趙興公神通起兵鄠縣有衆數千聞義旗渡河遣使迎帝又賊帥李仲文遣兄仲威送欵仲文則魏宻之從父也以密反於滎陽縁坐亡命招集無頼抄劫郿縣之間衆将四五千􅉦厔賊帥何潘児向善志等亦各率衆數千歸附冝君賊帥劉旻又率其黨數千人降帝並以不次封遣書勞之仍令各於當界率衆便受燉煌公部署旬日間京兆諸賊四面而至相繼歸義罔有所遺商農工賈各安其業京城留守代王及尚書衛文昇将軍隂世師京兆丞骨儀等以帝威徳遐振民願所從恐京邑之人一旦去盡乃閉門拒守運糧入宫帝聞而歎曰吾既平戎於王翼尊隋室欲立孺子以報髙皇今被見疑拒不相納方知邵奭不恱於周旦非徒言耳隂衛羣小負我之深己巳帝之蒲津觀河東城庚午南過永豐倉是夜宿扵臨晉濼渭合流之䖏将渡渭津人以見船朽破不堪帝渡及於濼水上流數十里更取好舡苦於水淺沙磧相次舡行不進憂怖不知所為其夜三更天甚晴霽忽然覺水暴長數尺逆流而上船泛深波得達津次及眀帝登船欲渡乃見逆流不已津司以聞衆咸駭異以爲光武滹沱之氷無以異此並於舟中拜賀帝曰此偶然耳吾何徳以堪之乃命所司以少牢祀濼渭并有事於華山帝至倉所勞軍見箱廩填實銘題數多喜謂從者曰千里逺来急於此耳此既入手餘復何論食之與兵今時且足信出于己久行諸将俱謹備守無為他慮未下馬仍開倉大賑饑民辛未還宫壬申進屯馮翊郡過舊宅饗告五廟禮也初周齊戰争之始周太祖數往同州侍從達官隨便各給田宅景皇帝與隋太祖並家於州治隋太祖宅在州城東南西臨大路景皇帝宅居州城西北而面濼水東西相望二里之間數十年中兩宅俱出受命之主相繼代興時人所見開闢已来未之有也乙亥燉煌公至􅉦厔所過諸縣及諸賊界莫不風馳草靡褁糧卷甲唯命是從遣使唘帝請期日赴京帝曰屈突東行不可西歸無路觀吾成敗方有所之不可爲虞矣乃命隴西公量簡倉上精兵自新豐道趍長樂離宫令燉煌公率新附諸軍自鄠縣道屯長安故城至並各聽教迨上郡雎隂以北咸遣使歸欵丙子大軍西引厯下邽過櫟陽路左所有煬帝行宫園苑及宫人等並罷之教曰大業已来廵幸過度宿止之處好依山水經茲勝地每起離宫峻宇雕墻亟成壮麗良家子女充仞其間怨曠感扵幽眀縻費極於民産替否迭進将何糺逖馳道所有宫室悉宜罷之其宫人等並放還親屬冬十月辛巳帝至㶚上仍進營停于大興城春眀門之西北與隴西燉煌等二公諸軍二十餘萬衆㑹焉帝勒諸軍各依壘壁勿入村居無為侵暴若無兵者恭以俟命代王與留守衛文昇隂世卿等以義兵多而且肅不令而齊門防轉嚴拒守愈固信使不通告喻事絶帝雖每遣使至城下申以尊隋夹輔之意愚人俗吏不達變通闇于事機往而無報如此向經旬日諸将相率唘帝曰京城不唘此是隋運其亡天既亡之非人能復違天棄日勞師費糧坐守愚夫恐非長䇿請進圍之以觀其意帝曰兵纒象魏矢及黄屋人其謂我何哉諸将對曰無成王之主不得行周公之事又恐巨猾之徒知義兵已定闗中来爭形勝請更思之帝乃逡廵未有報京兆舊賊帥等並以家近帝城不預元從恥無功乃各率所部兵分地逼城而上帝慮其輕脫失利辛夘命二公各将所統兵往為之援京城東面南面隴西公主之西面北面燉煌公主之城中見而失色更無他計惟冀屈突及東都救援而已甲午闗中羣帥等各請率驍銳登城二公莫之能止時帝在春明門外聞而馳入舍於羅郭安興坊以鎮之甲辰諸軍各競造攻具以臨城帝又未之許二公及文武所司等固請曰太原以来所過未嘗經宿長驅四塞罕有不克之城今至京師不時早定玩敵致寇以挫兵鋒又慮初附之人私輕太原之兵無能為也此機不小請速部分帝曰𢎞弩長㦸吾豈不許用之所冀内外共知以安天下斯志不果此外任諸公從民所欲然七廟及代王并宗室支戚不得有一驚犯乃下教有違此者罪及三族扵是諸軍各于所部營分角脩攻戰之具雲梯競聳樓橦争髙百道齊来千里並進繞京竹木殱于斯矣十一日丙辰昧爽咸自逼城帝聞而馳往欲止之而弗及纔至景風門東面軍頭雷永吉等已先登而入守城之人分崩帝乃遣二公率所綂兵依城外部分封府庫収圖籍禁􅳻掠軍人勿雜勿相驚恐太倉之外他無所干吏民安堵一如漢初入闗故事代王先在東宫乃奉迎居扵大興後殿是日帝還移營舍於長樂宫滻川上先是隋主以梟滅作逆掘其墳壟而洿其室隂世師骨儀等遂以為恒准乃令京兆郡訪帝之五廟塋域所在並發掘焉帝以此憾之言必流涕戊午収隂世師骨儀崔毗伽李仁政等並命隴西公斬扵朱雀街道以不從義而又愎焉餘無所問京邑士女懽娱道路華夷觀聽相顧欣欣乃命太常促擇吉日告髙廟定尊位立代王之禮文武将佐等議請曰天厭隋徳厯數在唐謳歌在路被于遐邇兵起晉陽逺定秦雍百餘日間廓清帝宅神武之速此謂若飛非天唘聖孰能如是昔漢髙入闗不即自王項羽後至悔無所及公雖卑以自牧須安天下僉議請依符䜟上尊號帝愀然改容曰舉兵之始本為社稷社稷有主孤何敢二劉季不立子嬰所以屈於項羽孤今尊奉丗嫡復何憂哉壬戌乃率百僚備羽儀法物具法駕迎代王即位於闕十餘嵗矣大赦天下改大業十二年為義寜元年復天下勿出今年租賦賜民子孫承後者爵一級是日仍遥尊後主為太上皇以少帝在不言廢也唐創業起居注卷中
